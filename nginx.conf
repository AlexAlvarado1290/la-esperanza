server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compresión local (Caddy también comprime al cliente final, esto baja CPU).
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Activos versionados por Vite (con hash en el nombre): cache largo.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html nunca se cachea (para que los deploys se vean al instante).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # SPA fallback: cualquier ruta no resuelta → index.html (React Router resuelve).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
